# Qwen3-Omni on 1x RTX PRO 6000 (96 GiB) with CPU weight offloading.
# Based on aws-1xrtxpro6000.yaml with gpu_memory_utilization lowered on
# stages 0 and 1 to force weight offloading via vLLM's UVA backend.
# cpu_offload_gb covers the deficit so model weights that do not fit in
# the reduced GPU budget are kept in pinned CPU memory.
async_chunk: true

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      codec_chunk_frames: 25
      codec_left_context_frames: 25

stages:
  - stage_id: 0
    max_model_len: 4096
    max_num_batched_tokens: 4096
    max_num_seqs: 128
    gpu_memory_utilization: 0.4
    cpu_offload_gb: 10
    trust_remote_code: true
    enable_prefix_caching: true
    devices: "0"
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    max_model_len: 4096
    max_num_batched_tokens: 4096
    max_num_seqs: 4
    gpu_memory_utilization: 0.3
    cpu_offload_gb: 10
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_model_len: 4096
    max_num_batched_tokens: 4096
    max_num_seqs: 4
    gpu_memory_utilization: 0.1
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    async_scheduling: false
    devices: "0"
    input_connectors:
      from_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.1
