# Qwen3-Omni-30B-A3B on 1x H100 80GB — all stages on device 0, FP8.
# Based on tested l42-h02-1gpu-fp8.yaml config.
async_chunk: false

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      codec_chunk_frames: 25
      codec_left_context_frames: 25

stages:
  - stage_id: 0
    quantization: fp8
    max_model_len: 4096
    max_num_batched_tokens: 4096
    max_num_seqs: 32
    gpu_memory_utilization: 0.78
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    quantization: fp8
    max_model_len: 4096
    max_num_batched_tokens: 4096
    max_num_seqs: 32
    gpu_memory_utilization: 0.13
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_model_len: 4096
    max_num_batched_tokens: 4096
    max_num_seqs: 8
    gpu_memory_utilization: 0.05
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    async_scheduling: false
    devices: "0"
    input_connectors:
      from_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.1
