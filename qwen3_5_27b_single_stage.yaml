# Qwen/Qwen3.5-27B single-stage LLM deploy.
#
# Usage:
#   vllm-omni serve Qwen/Qwen3.5-27B --omni \
#       --deploy-config qwen3_5_27b_single_stage.yaml

stages:
  - stage_id: 0
    stage_type: llm
    final_output: true
    is_comprehension: true
    runtime:
      devices: "0,1"
    engine_args:
      gpu_memory_utilization: 0.9
      tensor_parallel_size: 2
      max_model_len: 32768
      max_num_seqs: 64
    default_sampling_params:
      temperature: 0.7
      top_p: 0.9
      max_tokens: 4096
